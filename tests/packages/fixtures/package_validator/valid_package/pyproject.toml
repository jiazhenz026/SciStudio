[project]
name = "pv-valid-package"
version = "0.1.0"
description = "ADR-049 valid package-validator fixture."
requires-python = ">=3.11"

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]

[project.entry-points."scistudio.blocks"]
valid = "pv_valid_package:get_block_package"

[project.entry-points."scistudio.types"]
valid = "pv_valid_package:get_types"

[project.entry-points."scistudio.previewers"]
valid = "pv_valid_package:get_previewers"
