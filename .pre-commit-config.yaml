repos:
  - repo: local
    hooks:
      - id: scistudio-governance-mod-guard
        name: SciStudio governance modification guard
        entry: python scripts/hooks/run_python_module.py scistudio.qa.governance.mod_guard --staged
        language: system
        pass_filenames: false
        files: ^(AGENTS\.md|\.workflow/|\.github/workflows/|\.pre-commit-config\.yaml|docs/adr/ADR-042\.md|docs/specs/adr-042-.*\.md|src/scistudio/qa/|tests/qa/)
      - id: scistudio-weakened-ci-check
        name: SciStudio weakened CI/pre-commit check
        entry: python scripts/hooks/run_python_module.py scistudio.qa.governance.weakened_ci_check --staged
        language: system
        pass_filenames: false
        files: ^(\.github/workflows/|\.pre-commit-config\.yaml|pyproject\.toml)
      - id: scistudio-gate-record-pre-commit
        name: SciStudio ADR-042 gate record pre-commit
        entry: python scripts/hooks/run_python_module.py scistudio.qa.governance.gate_record pre-commit --staged
        language: system
        pass_filenames: false
        files: ^(src/|packages/|frontend/|web/|tests/|\.workflow/records/|\.github/workflows/|\.pre-commit-config\.yaml|scripts/hooks/)
      - id: scistudio-gate-record-commit-msg
        name: SciStudio ADR-042 gate record commit message
        entry: python scripts/hooks/run_python_module.py scistudio.qa.governance.gate_record commit-msg
        language: system
        stages: [commit-msg]

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files
        args: ["--maxkb=1000"]
      - id: check-merge-conflict
      - id: detect-private-key

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.4
    hooks:
      - id: ruff
        args: ["--fix"]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.15.0
    hooks:
      - id: mypy
        additional_dependencies: []
        args: ["--ignore-missing-imports"]

  - repo: https://github.com/commitizen-tools/commitizen
    rev: v4.4.1
    hooks:
      - id: commitizen
        stages: [commit-msg]
