repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files
        args: ["--maxkb=1000"]
      - id: check-merge-conflict
      - id: detect-private-key

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.4
    hooks:
      - id: ruff
        args: ["--fix"]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.15.0
    hooks:
      - id: mypy
        additional_dependencies: ["types-PyYAML>=6.0"]
        args: ["--ignore-missing-imports"]

  - repo: https://github.com/codespell-project/codespell
    rev: v2.4.1
    hooks:
      - id: codespell
        args: ["--config", ".codespellrc"]

  - repo: https://github.com/adrienverge/yamllint.git
    rev: v1.37.1
    hooks:
      - id: yamllint
        args: ["-c", ".yamllint"]

  - repo: https://github.com/tox-dev/pyproject-fmt
    rev: v2.6.0
    hooks:
      - id: pyproject-fmt
        args: ["--check"]

  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.7
    hooks:
      - id: actionlint

  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.18.1
    hooks:
      - id: markdownlint-cli2
        files: ^docs/.*\.md$

  - repo: https://github.com/commitizen-tools/commitizen
    rev: v4.4.1
    hooks:
      - id: commitizen
        stages: [commit-msg]

  - repo: local
    hooks:
      - id: adr042-code-score
        name: ADR-042 code score
        entry: python scripts/qa/run_adr042_check.py code-score --changed --fast
        language: system
        pass_filenames: false
        stages: [pre-commit]

      - id: adr042-local-gate
        name: ADR-042 AI local gate
        entry: python scripts/qa/run_adr042_check.py local-gate pre-commit
        language: system
        pass_filenames: false
        stages: [pre-commit]

      - id: adr042-local-gate-commit-msg
        name: ADR-042 AI commit trailers
        entry: python scripts/qa/run_adr042_check.py local-gate commit-msg
        language: system
        stages: [commit-msg]

      - id: adr042-zizmor
        name: ADR-042 GitHub Actions security lint
        entry: python -m zizmor .github/workflows
        language: system
        pass_filenames: false
        files: ^\.github/workflows/.*\.ya?ml$
        stages: [pre-commit]

      - id: frontend-eslint
        name: Frontend ESLint
        entry: npm --prefix frontend run lint --
        language: system
        files: ^frontend/src/.*\.(ts|tsx)$
        pass_filenames: false
        stages: [pre-commit]

      - id: frontend-prettier
        name: Frontend Prettier check
        entry: npm --prefix frontend run format:check --
        language: system
        files: ^frontend/src/.*\.(ts|tsx|css|md|json)$
        pass_filenames: false
        stages: [pre-commit]

      - id: adr042-frontmatter-lint
        name: ADR-042 frontmatter lint
        entry: python scripts/qa/run_adr042_check.py frontmatter-lint
        language: system
        files: ^docs/.*\.md$
        stages: [pre-commit]

      - id: adr042-doc-length-lint
        name: ADR-042 doc length lint
        entry: python scripts/qa/run_adr042_check.py doc-length-lint
        language: system
        files: ^docs/.*\.md$
        stages: [pre-commit]

      - id: adr042-auto-generated-lint
        name: ADR-042 generated docs freshness
        entry: python scripts/qa/run_adr042_check.py auto-generated-lint
        language: system
        pass_filenames: false
        files: ^(docs/user/llms\.txt|docs/user/reference/|src/scieasy/qa/docs/|src/scieasy/(api|blocks|cli)/|pyproject\.toml)
        stages: [pre-commit]

      - id: adr042-skill-pointer-sync
        name: ADR-042 skill pointer sync
        entry: python scripts/qa/run_adr042_check.py skill-pointer-sync
        language: system
        pass_filenames: false
        files: ^(\.claude/skills/|\.codex/skills/|docs/(contributing|doc-guide)/)
        stages: [pre-commit]

      - id: adr042-generate-facts
        name: ADR-042 generated facts freshness
        entry: python scripts/audit/generate_facts.py --check
        language: system
        pass_filenames: false
        files: ^(docs/(adr|specs)/|src/scieasy/qa/|pyproject\.toml|\.github/workflows/|\.pre-commit-config\.yaml|pyrightconfig\.json|MAINTAINERS)
        stages: [pre-commit]

      - id: adr042-trailer-lint
        name: ADR-042 AI trailer lint
        entry: python scripts/qa/run_adr042_check.py trailer-lint --range HEAD~1..HEAD
        language: system
        pass_filenames: false
        stages: [pre-push]
