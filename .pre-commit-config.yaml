repos:
  - repo: local
    hooks:
      - id: scieasy-governance-mod-guard
        name: SciEasy governance modification guard
        entry: python -m scieasy.qa.governance.mod_guard --staged
        language: system
        pass_filenames: false
        files: ^(AGENTS\.md|\.workflow/|\.github/workflows/|\.pre-commit-config\.yaml|docs/adr/ADR-042\.md|docs/specs/adr-042-.*\.md|src/scieasy/qa/|tests/qa/)
      - id: scieasy-weakened-ci-check
        name: SciEasy weakened CI/pre-commit check
        entry: python -m scieasy.qa.governance.weakened_ci_check --staged
        language: system
        pass_filenames: false
        files: ^(\.github/workflows/|\.pre-commit-config\.yaml|pyproject\.toml)

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files
        args: ["--maxkb=1000"]
      - id: check-merge-conflict
      - id: detect-private-key

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.4
    hooks:
      - id: ruff
        args: ["--fix"]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.15.0
    hooks:
      - id: mypy
        additional_dependencies: []
        args: ["--ignore-missing-imports"]

  - repo: https://github.com/commitizen-tools/commitizen
    rev: v4.4.1
    hooks:
      - id: commitizen
        stages: [commit-msg]
