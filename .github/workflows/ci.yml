name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches:
      - main
      # ADR-038/039 cascade tracking branches — sub-agent PRs target these
      # (NOT main) per docs/planning/adr-038-039-checklist.md. Without this,
      # CI only runs at the eventual integration PR to main, leaving every
      # intermediate sub-agent PR without a verification signal.
      - 'track/**'
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          cache: true
          cache-dependency-path: pyproject.toml
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: uv pip install --system ruff
      # ADR-042 §4.3 line 514: ruff invoked with --output-format=json-lines
      # --statistics so the ratchet wrapper (TC-1G.1) can consume per-finding
      # output without ruff truncating or summarising. The human-facing
      # `ruff check .` invocation is kept for readability of the CI log.
      - run: ruff check .
      - run: ruff format --check .
      # Phase -0.5 temporary review gate (ADR-042/043/044 cascade).
      # Co-located inside the lint job so the decommission PR can remove
      # it surgically; see docs/planning/phase-0-5-temp-review-design.md §6.
      - name: Phase -0.5 temporary review
        run: python -m scripts.audit.temp_review --ci

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          cache: true
          cache-dependency-path: pyproject.toml
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: uv pip install --system -e ".[dev]"
      - name: Run mypy
        # ADR-042 §4.3 lines 510-511: mypy invoked with --soft-error-limit=-1
        # explicitly. The default IS -1 (no truncation), but any positive
        # integer silently truncates errors past the limit and defeats
        # per-finding tracking — so the flag is pinned here to lock the
        # zero-tolerance ratchet's contract with mypy.
        run: |
          if [ -d src/scieasy ]; then
            mypy --soft-error-limit=-1 src/scieasy/ --ignore-missing-imports
          else
            echo "No src/scieasy/ directory yet — skipping"
          fi

  architecture:
    name: Architecture Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          cache: true
          cache-dependency-path: pyproject.toml
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: uv pip install --system -e ".[dev]"
      - name: Run architecture tests
        run: pytest tests/architecture/ -v --no-cov

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.13"]
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          cache: true
          cache-dependency-path: pyproject.toml
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - run: uv pip install --system -e ".[dev]" pytest-timeout
      - name: Run tests
        shell: bash {0}
        env:
          SCIEASY_DEV: "1"
        # ``--timeout=60`` (pytest-timeout) hard-kills any test that hangs
        # past 60 s and prints its traceback, so a stuck CI surfaces a
        # diagnosable failure instead of timing out the whole job at 6 h.
        # ``timeout 600`` is a belt-and-suspenders shell-level kill in
        # case pytest-timeout itself wedges (xdist + pty edge cases).
        run: |
          if [ "${{ matrix.python-version }}" = "3.13" ]; then
            timeout 600 pytest -n auto --timeout=60 --timeout-method=thread
          else
            timeout 600 pytest -n auto --no-cov --timeout=60 --timeout-method=thread
          fi
          rc=$?
          if [ $rc -eq 5 ]; then
            echo "No tests collected — skipping"
            exit 0
          fi
          if [ $rc -eq 124 ]; then
            echo "::error::pytest exceeded 600s shell timeout (hang escaped --timeout=60)"
          fi
          exit $rc

  import-lint:
    name: Import Contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          cache: true
          cache-dependency-path: pyproject.toml
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: uv pip install --system -e ".[dev]"
      - name: Run import linter
        run: |
          if [ -d src/scieasy ]; then
            lint-imports
          else
            echo "No src/scieasy/ directory yet — skipping"
          fi

  # frontend:
  #   name: Frontend Build
  #   runs-on: ubuntu-latest
  #   # Not yet implemented — frontend/src/ does not exist.
  #   # Enable this job when frontend development begins.
  #   steps:
  #     - uses: actions/checkout@v6
  #     - uses: actions/setup-node@v6
  #       with:
  #         node-version: "20"
  #     - run: cd frontend && npm ci && npm run build

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "frontend/package-lock.json"
      - name: Install frontend deps
        working-directory: frontend
        run: npm ci
      - name: Run frontend tests
        working-directory: frontend
        run: npm test
      - name: Build frontend
        working-directory: frontend
        run: npm run build
      - name: Check frontend/dist not stale relative to src
        # #406: Ensure the committed frontend/dist/ reflects the current
        # frontend/src/.  If any source file is newer than dist/index.html
        # the build was not committed and developers must run
        # 'cd frontend && npm run build' and commit the result.
        # This step runs AFTER the build step so dist/index.html always
        # exists in CI, and the mtime comparison is meaningful.
        run: |
          STALE=$(find frontend/src -newer frontend/dist/index.html 2>/dev/null | head -1)
          if [ -n "$STALE" ]; then
            echo "ERROR: frontend/dist is stale. At least one source file is newer than dist/index.html:"
            echo "  $STALE"
            echo "Run 'cd frontend && npm run build' and commit the result."
            exit 1
          fi
          echo "frontend/dist is up to date."

  build-frontend-release:
    name: Build Frontend for Release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "frontend/package-lock.json"
      - name: Build frontend for packaging
        working-directory: frontend
        run: npm ci && npm run build
      - name: Copy build output to Python package
        run: cp -r frontend/dist/ src/scieasy/api/static/
      - uses: actions/upload-artifact@v7
        with:
          name: frontend-static
          path: src/scieasy/api/static/
