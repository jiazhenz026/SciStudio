name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches:
      - main
      # ADR-038/039 cascade tracking branches — sub-agent PRs target these
      # (NOT main) per docs/planning/adr-038-039-checklist.md. Without this,
      # CI only runs at the eventual integration PR to main, leaving every
      # intermediate sub-agent PR without a verification signal.
      - 'track/**'
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
        with:
          cache: true
          cache-dependency-path: pyproject.toml
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: uv pip install --system ruff
      - run: ruff check .
      - run: ruff format --check .

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
        with:
          cache: true
          cache-dependency-path: pyproject.toml
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: uv pip install --system -e ".[dev]"
      - name: Run mypy
        run: |
          if [ -d src/scistudio ]; then
            mypy src/scistudio/ --ignore-missing-imports
          else
            echo "No src/scistudio/ directory yet — skipping"
          fi

  architecture:
    name: Architecture Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
        with:
          cache: true
          cache-dependency-path: pyproject.toml
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: uv pip install --system -e ".[dev]"
      - name: Run architecture tests
        run: pytest tests/architecture/ -v --no-cov

  full-audit:
    name: Full Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
        with:
          cache: true
          cache-dependency-path: pyproject.toml
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: uv pip install --system -e ".[dev]"
      - name: Run ADR-042 full audit
        run: |
          mkdir -p .audit
          PYTHONPATH=src python -m scistudio.qa.audit.full_audit \
            --repo-root . \
            --format json \
            --output .audit/full-audit.json
      - name: Upload full audit report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: full-audit-report
          path: .audit/full-audit.json

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.13"]
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
        with:
          cache: true
          cache-dependency-path: pyproject.toml
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - run: uv pip install --system -e ".[dev]" pytest-timeout
      - name: Run tests
        shell: bash {0}
        # ``--timeout=60`` (pytest-timeout) hard-kills any test that hangs
        # past 60 s and prints its traceback, so a stuck CI surfaces a
        # diagnosable failure instead of timing out the whole job at 6 h.
        # ``timeout 600`` is a belt-and-suspenders shell-level kill in
        # case pytest-timeout itself wedges (xdist + pty edge cases).
        run: |
          if [ "${{ matrix.python-version }}" = "3.13" ]; then
            timeout 600 pytest -n auto --timeout=60 --timeout-method=thread
          else
            timeout 600 pytest -n auto --no-cov --timeout=60 --timeout-method=thread
          fi
          rc=$?
          if [ $rc -eq 5 ]; then
            echo "No tests collected — skipping"
            exit 0
          fi
          if [ $rc -eq 124 ]; then
            echo "::error::pytest exceeded 600s shell timeout (hang escaped --timeout=60)"
          fi
          exit $rc

  import-lint:
    name: Import Contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
        with:
          cache: true
          cache-dependency-path: pyproject.toml
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: uv pip install --system -e ".[dev]"
      - name: Run import linter
        run: |
          if [ -d src/scistudio ]; then
            lint-imports
          else
            echo "No src/scistudio/ directory yet — skipping"
          fi

  # frontend:
  #   name: Frontend Build
  #   runs-on: ubuntu-latest
  #   # Not yet implemented — frontend/src/ does not exist.
  #   # Enable this job when frontend development begins.
  #   steps:
  #     - uses: actions/checkout@v7
  #     - uses: actions/setup-node@v6
  #       with:
  #         node-version: "20"
  #     - run: cd frontend && npm ci && npm run build

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "frontend/package-lock.json"
      - name: Install frontend deps
        working-directory: frontend
        run: npm ci
      - name: Lint frontend (ESLint)
        working-directory: frontend
        run: npm run lint
      - name: Check frontend formatting (Prettier)
        working-directory: frontend
        run: npm run format:check
      - name: Typecheck frontend (tsc --noEmit)
        working-directory: frontend
        run: npm run typecheck
      - name: Run frontend tests
        working-directory: frontend
        run: npm test
      - name: Build frontend
        working-directory: frontend
        run: npm run build

  wheel-release-smoke:
    name: Wheel Release Smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "frontend/package-lock.json"
      - name: Install build frontend
        run: python -m pip install --upgrade pip build
      - name: Build frontend for packaging
        working-directory: frontend
        run: npm ci && npm run build
      - name: Copy build output to Python package
        run: |
          rm -rf src/scistudio/api/static
          cp -r frontend/dist/ src/scistudio/api/static/
      - name: Verify frontend bundle staged for wheel
        run: |
          test -f src/scistudio/api/static/index.html || {
            echo "ERROR: missing src/scistudio/api/static/index.html after copying frontend/dist."
            exit 1
          }
          JS_ASSET=$(find src/scistudio/api/static/assets -type f -name '*.js' -print -quit)
          if [ -z "$JS_ASSET" ]; then
            echo "ERROR: missing JS asset under src/scistudio/api/static/assets after copying frontend/dist."
            exit 1
          fi
          grep -q '/assets/' src/scistudio/api/static/index.html || {
            echo "ERROR: staged frontend index.html does not reference bundled assets."
            exit 1
          }
      - name: Build wheel with required frontend bundle
        env:
          SCISTUDIO_REQUIRE_FRONTEND_BUILD: "1"
        run: python -m build --wheel
      - name: Inspect wheel SPA contents
        run: |
          python - <<'PY'
          from pathlib import Path
          from zipfile import ZipFile

          wheels = list(Path("dist").glob("*.whl"))
          if len(wheels) != 1:
              raise SystemExit(f"expected exactly one wheel, found {wheels}")

          with ZipFile(wheels[0]) as wheel:
              names = set(wheel.namelist())

          index = "scistudio/api/static/index.html"
          js_assets = [
              name
              for name in names
              if name.startswith("scistudio/api/static/assets/") and name.endswith(".js")
          ]
          if index not in names:
              raise SystemExit(f"missing {index} in {wheels[0]}")
          if not js_assets:
              raise SystemExit(f"missing JS asset under scistudio/api/static/assets/ in {wheels[0]}")
          print(f"{wheels[0]} contains {index} and {len(js_assets)} JS asset(s)")
          PY
      - name: Install wheel and smoke-test GUI root
        run: |
          python -m venv .venv-wheel-smoke
          . .venv-wheel-smoke/bin/activate
          python -m pip install --upgrade pip
          python -m pip install dist/*.whl
          python - <<'PY'
          from fastapi.testclient import TestClient

          from scistudio.api.app import create_app

          with TestClient(create_app()) as client:
              response = client.get("/", follow_redirects=False)

          if response.is_redirect or response.headers.get("location") == "/docs":
              raise SystemExit("GET / redirected to /docs instead of serving the GUI")
          if response.status_code != 200:
              raise SystemExit(f"GET / returned {response.status_code}")
          if "<html" not in response.text.lower() or "/assets/" not in response.text:
              raise SystemExit("GET / did not return bundled GUI HTML")
          print("GET / served bundled GUI HTML")
          PY
      - name: Upload verified wheel
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v7
        with:
          name: scistudio-wheel
          path: dist/*.whl
