name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  workflow-gate:
    name: Workflow Gate
    runs-on: ubuntu-latest
    needs:
      - lint
      - typecheck
      - test
      - import-boundaries
      - docs-build
      - audit
      - code-score
      - frontend
      - security
      - workflow-lint
    if: always()
    steps:
      - name: Require linked issue
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          if [ "$EVENT_NAME" != "pull_request" ]; then
            echo "$EVENT_NAME run; skipping PR issue-link check"
            exit 0
          fi
          if ! echo "$PR_BODY" | grep -qiE "(closes|fixes|resolves)\s+#[0-9]+"; then
            echo "::error::PR must link an issue with Closes/Fixes/Resolves #NNN"
            exit 1
          fi
          echo "Issue link found"

      - name: Require ADR-042 quality jobs
        env:
          NEEDS_JSON: ${{ toJSON(needs) }}
        run: |
          python - <<'PY'
          import json
          import os
          import sys

          needs = json.loads(os.environ["NEEDS_JSON"])
          failed = {name: data.get("result") for name, data in needs.items() if data.get("result") != "success"}
          if failed:
              for name, result in failed.items():
                  print(f"::error::Required ADR-042 quality job {name!r} ended with {result!r}")
              sys.exit(1)
          print("All ADR-042 required quality jobs passed")
          PY

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@94527f2e458b27549849d47d273a16bec83a01e9
        with:
          enable-cache: true
          cache-dependency-glob: pyproject.toml
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.13"
      - run: uv pip install --system ".[dev]"
      - run: ruff check .
      - run: ruff format --check .
      - run: pyproject-fmt --check --expand-tables tool.mypy.overrides,tool.pytest.ini_options pyproject.toml
      - run: yamllint .
      - run: codespell --config .codespellrc .

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@94527f2e458b27549849d47d273a16bec83a01e9
        with:
          enable-cache: true
          cache-dependency-glob: pyproject.toml
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.13"
      - run: uv pip install --system ".[dev]"
      - run: mypy src/scieasy/ --ignore-missing-imports
      - run: pyright

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.13"]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@94527f2e458b27549849d47d273a16bec83a01e9
        with:
          enable-cache: true
          cache-dependency-glob: pyproject.toml
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: ${{ matrix.python-version }}
      - run: uv pip install --system ".[dev]" ./packages/scieasy-blocks-imaging
      - name: Run pytest
        shell: bash
        env:
          SCIEASY_DEV: "1"
        run: |
          if [ "${{ matrix.python-version }}" = "3.13" ]; then
            timeout 600 pytest -n auto --randomly-seed=42 --timeout=60 --timeout-method=thread
          else
            timeout 600 pytest -n auto --no-cov --randomly-seed=42 --timeout=60 --timeout-method=thread
          fi
          rc=$?
          if [ $rc -eq 5 ]; then
            echo "No tests collected; skipping"
            exit 0
          fi
          if [ $rc -eq 124 ]; then
            echo "::error::pytest exceeded the 600s shell timeout"
          fi
          exit $rc

  import-boundaries:
    name: Import Boundaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@94527f2e458b27549849d47d273a16bec83a01e9
        with:
          enable-cache: true
          cache-dependency-glob: pyproject.toml
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.13"
      - run: uv pip install --system ".[dev]"
      - run: lint-imports

  docs-build:
    name: Docs Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@94527f2e458b27549849d47d273a16bec83a01e9
        with:
          enable-cache: true
          cache-dependency-glob: pyproject.toml
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.13"
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "frontend/package-lock.json"
      - run: uv pip install --system ".[dev,docs]"
      - run: npm --prefix frontend ci
      - run: npm install -g markdownlint-cli2
      - run: markdownlint-cli2 "docs/**/*.md"
      - run: python -m scieasy.qa.docs.generate_reference --target all --check
      - run: npm --prefix frontend run docs:api
      - run: sphinx-lint docs
      - run: sphinx-build -b html -W --keep-going -n docs/sphinx docs/_build/html
      - run: sphinx-build -b linkcheck -W --keep-going docs/sphinx docs/_build/linkcheck

  audit:
    name: Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
          fetch-depth: 0
      - uses: astral-sh/setup-uv@94527f2e458b27549849d47d273a16bec83a01e9
        with:
          enable-cache: true
          cache-dependency-glob: pyproject.toml
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.13"
      - run: uv pip install --system ".[dev,docs]"
      - name: Run ADR-042 documentation governance checks
        run: |
          python scripts/qa/run_adr042_check.py frontmatter-lint docs --recursive
          python scripts/qa/run_adr042_check.py doc-length-lint docs
          python scripts/qa/run_adr042_check.py auto-generated-lint
          python scripts/qa/run_adr042_check.py skill-pointer-sync
      - name: Run ADR-042 consistency checks
        run: |
          python scripts/audit/generate_facts.py --check
          python scripts/qa/run_adr042_check.py doc-drift --facts docs/facts/generated.yaml --format json
          python scripts/qa/run_adr042_check.py fact-drift --facts docs/facts/generated.yaml --format json
          python scripts/qa/run_adr042_check.py closure --facts docs/facts/generated.yaml --format json
          python scripts/qa/run_adr042_check.py signature-drift --facts docs/facts/generated.yaml --format json
          python scripts/qa/run_adr042_check.py full-audit --facts docs/facts/generated.yaml --format json
      - name: Run API and code health audit tools
        run: |
          griffe dump scieasy --search-path src
          interrogate src/scieasy
          pydoclint src/scieasy
          vulture src scripts
          xenon --max-absolute B --max-modules B --max-average A src/scieasy
      - name: Run ADR-042 test quality checks
        env:
          BASE_REF: ${{ github.event_name == 'pull_request' && format('origin/{0}', github.base_ref) || 'HEAD~1' }}
        run: |
          python -m scieasy.qa.test_quality.ast_lint tests --format json
          python -m scieasy.qa.test_quality.test_first_check --base "$BASE_REF" --head HEAD --format json
          python -m scieasy.qa.test_quality.mutation_runner --changed --base "$BASE_REF" --head HEAD --format json
      - name: Run ADR-042 governed-change checks
        env:
          BASE_REF: ${{ github.event_name == 'pull_request' && format('origin/{0}', github.base_ref) || 'HEAD~1' }}
        run: |
          python scripts/qa/run_adr042_check.py complete-artifacts --base "$BASE_REF" --head HEAD --format json
          python scripts/qa/run_adr042_check.py codemod-lint --base "$BASE_REF" --head HEAD --format json

  code-score:
    name: Code Score
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
          fetch-depth: 0
      - uses: astral-sh/setup-uv@94527f2e458b27549849d47d273a16bec83a01e9
        with:
          enable-cache: true
          cache-dependency-glob: pyproject.toml
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.13"
      - run: uv pip install --system ".[dev]"
      - name: Score changed modules
        env:
          BASE_REF: ${{ github.event_name == 'pull_request' && format('origin/{0}', github.base_ref) || 'HEAD~1' }}
        run: |
          mkdir -p docs/audit/code-score/changes
          python scripts/qa/run_adr042_check.py code-score --changed --full --base "$BASE_REF" --head HEAD --ai-advisory --ai-provider codex --format json --write "docs/audit/code-score/changes/${GITHUB_SHA}.json"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        if: always()
        with:
          name: code-score-report
          path: docs/audit/code-score/changes/*.json

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "frontend/package-lock.json"
      - name: Install frontend deps
        working-directory: frontend
        run: npm ci
      - name: Run frontend lint
        working-directory: frontend
        run: npm run lint
      - name: Check frontend format
        working-directory: frontend
        run: npm run format:check
      - name: Run frontend typecheck
        working-directory: frontend
        run: npm run typecheck
      - name: Run frontend tests
        working-directory: frontend
        run: npm test
      - name: Build frontend
        working-directory: frontend
        run: npm run build

  security:
    name: Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@94527f2e458b27549849d47d273a16bec83a01e9
        with:
          enable-cache: true
          cache-dependency-glob: pyproject.toml
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.13"
      - run: uv pip install --system ".[dev]"
      - name: Run dependency audit
        run: |
          uv pip compile pyproject.toml --extra dev --no-emit-package scieasy --output-file /tmp/scieasy-audit-requirements.txt
          pip-audit -r /tmp/scieasy-audit-requirements.txt
      - run: ruff check --select S src scripts tests
      - run: bandit -c pyproject.toml -r src/scieasy

  workflow-lint:
    name: Workflow Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@94527f2e458b27549849d47d273a16bec83a01e9
        with:
          enable-cache: true
          cache-dependency-glob: pyproject.toml
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.13"
      - run: uv pip install --system ".[dev]"
      - run: pre-commit run actionlint --all-files
      - run: zizmor .github/workflows
      - name: Run ADR-042 governance weakening checks
        env:
          BASE_REF: ${{ github.event_name == 'pull_request' && format('origin/{0}', github.base_ref) || 'HEAD~1' }}
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            python scripts/qa/run_adr042_check.py human-bypass --pr "${{ github.event.pull_request.number }}" --repo "${{ github.repository }}" --format json
          fi
          python scripts/qa/run_adr042_check.py weakened-ci --base "$BASE_REF" --head HEAD --format json
          python scripts/qa/run_adr042_check.py governance-mod-guard --base "$BASE_REF" --head HEAD --format json
          python scripts/qa/run_adr042_check.py core-change-guard --base "$BASE_REF" --head HEAD --format json
          python scripts/qa/run_adr042_check.py trailer-lint --range "$BASE_REF..HEAD" --format json

  build-frontend-release:
    name: Build Frontend for Release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "frontend/package-lock.json"
      - name: Build frontend for packaging
        working-directory: frontend
        run: |
          npm ci
          npm run build
      - name: Copy build output to Python package
        run: cp -r frontend/dist/ src/scieasy/api/static/
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: frontend-static
          path: src/scieasy/api/static/
