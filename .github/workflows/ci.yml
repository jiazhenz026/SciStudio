name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  workflow-gate:
    name: Workflow Gate
    runs-on: ubuntu-latest
    needs:
      - lint
      - typecheck
      - test
      - import-boundaries
      - frontend
      - code-score
      - docs-governance
    if: always()
    steps:
      - name: Require linked issue
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          if [ "$EVENT_NAME" != "pull_request" ]; then
            echo "$EVENT_NAME run; skipping PR issue-link check"
            exit 0
          fi
          if ! echo "$PR_BODY" | grep -qiE "(closes|fixes|resolves)\s+#[0-9]+"; then
            echo "::error::PR must link an issue with Closes/Fixes/Resolves #NNN"
            exit 1
          fi
          echo "Issue link found"
      - name: Require ADR-042 quality jobs
        env:
          NEEDS_JSON: ${{ toJSON(needs) }}
        run: |
          python - <<'PY'
          import json
          import os
          import sys

          needs = json.loads(os.environ["NEEDS_JSON"])
          failed = {name: data.get("result") for name, data in needs.items() if data.get("result") != "success"}
          if failed:
              for name, result in failed.items():
                  print(f"::error::Required ADR-042 quality job {name!r} ended with {result!r}")
              sys.exit(1)
          print("All ADR-042 required quality jobs passed")
          PY

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          cache: true
          cache-dependency-path: pyproject.toml
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: uv pip install --system ruff
      - run: ruff check .
      - run: ruff format --check .

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          cache: true
          cache-dependency-path: pyproject.toml
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: uv pip install --system ".[dev]"
      - run: mypy src/scieasy/ --ignore-missing-imports

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.13"]
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          cache: true
          cache-dependency-path: pyproject.toml
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - run: uv pip install --system ".[dev]" ./packages/scieasy-blocks-imaging pytest-timeout
      - name: Run pytest
        shell: bash
        env:
          SCIEASY_DEV: "1"
        run: |
          if [ "${{ matrix.python-version }}" = "3.13" ]; then
            timeout 600 pytest -n auto --timeout=60 --timeout-method=thread
          else
            timeout 600 pytest -n auto --no-cov --timeout=60 --timeout-method=thread
          fi
          rc=$?
          if [ $rc -eq 5 ]; then
            echo "No tests collected; skipping"
            exit 0
          fi
          if [ $rc -eq 124 ]; then
            echo "::error::pytest exceeded the 600s shell timeout"
          fi
          exit $rc

  import-boundaries:
    name: Import Boundaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          cache: true
          cache-dependency-path: pyproject.toml
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: uv pip install --system ".[dev]"
      - run: lint-imports

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "frontend/package-lock.json"
      - name: Install frontend deps
        working-directory: frontend
        run: npm ci
      - name: Run frontend tests
        working-directory: frontend
        run: npm test
      - name: Build frontend
        working-directory: frontend
        run: npm run build

  code-score:
    name: Code Score
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v7
        with:
          cache: true
          cache-dependency-path: pyproject.toml
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: uv pip install --system ".[dev]"
      - name: Score changed modules
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_REF="origin/${{ github.base_ref }}"
          else
            BASE_REF="HEAD~1"
          fi
          python scripts/qa/run_adr042_check.py code-score --changed --full --base "$BASE_REF" --head HEAD --format text

  docs-governance:
    name: Docs Governance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          cache: true
          cache-dependency-path: pyproject.toml
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: uv pip install --system ".[dev]"
      - name: Run ADR-042 documentation governance checks
        run: |
          python scripts/qa/run_adr042_check.py frontmatter-lint \
            docs/adr/ADR-042.md \
            docs/specs/adr-042-code-quality-tools.md \
            docs/specs/adr-042-documentation-tools.md \
            docs/specs/adr-042-consistency-tools.md \
            docs/specs/adr-042-ai-governance-tools.md
          python scripts/qa/run_adr042_check.py doc-length-lint \
            docs/contributing docs/user docs/prod-agent docs/doc-guide
          python scripts/qa/run_adr042_check.py auto-generated-lint
          python scripts/qa/run_adr042_check.py skill-pointer-sync

  build-frontend-release:
    name: Build Frontend for Release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "frontend/package-lock.json"
      - name: Build frontend for packaging
        working-directory: frontend
        run: npm ci && npm run build
      - name: Copy build output to Python package
        run: cp -r frontend/dist/ src/scieasy/api/static/
      - uses: actions/upload-artifact@v7
        with:
          name: frontend-static
          path: src/scieasy/api/static/
