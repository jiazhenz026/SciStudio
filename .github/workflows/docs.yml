name: Docs

# Publish the combined SciStudio documentation site to GitHub Pages: the user
# guide, the self-contained public-API reference (ADR-052 §7), and the package
# development guide.
#
# scripts/docs/build_site.py generates the self-contained reference from
# docstrings + the scistudio.stability decorators, stages the unified docs tree,
# and runs `mkdocs build`. The reference is the SAME artifact provisioned into
# projects, so the published site cannot drift from the code or from what ships
# with the app. On every push to main the site is rebuilt and deployed to
# https://<owner>.github.io/<repo>/.
#
# One-time setup by a repo admin: Settings -> Pages -> Build and deployment ->
# Source = "GitHub Actions". No gh-pages branch is created (artifact deploy).

on:
  push:
    branches: [main]
    # Only rebuild when something that affects the site changes.
    paths:
      - "src/**"
      - "docs/package-development/**"
      - "mkdocs.site.yml"
      - "scripts/docs/**"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

# Least privilege for the deploy job; the build job needs nothing special.
permissions:
  contents: read
  pages: write
  id-token: write

# Never run two Pages deploys at once; let an in-flight run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build docs site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
        with:
          cache: true
          cache-dependency-path: pyproject.toml
      - uses: actions/setup-python@v7
        with:
          python-version: "3.13"
      - run: uv pip install --system -e ".[docs]"
      # Generates the self-contained API reference, stages the unified docs tree
      # (user guide + reference + package development), and runs `mkdocs build`,
      # writing the static site to build/site.
      - run: PYTHONPATH=src python scripts/docs/build_site.py
      - uses: actions/upload-pages-artifact@v5
        with:
          path: build/site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
