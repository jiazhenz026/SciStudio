name: Docs Build

on:
  pull_request:
    branches: [main]
    paths:
      - "docs/**"
      - "src/scieasy/**"
      - "pyproject.toml"
      - ".github/workflows/docs-build.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  docs-build:
    name: Docs Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@94527f2e458b27549849d47d273a16bec83a01e9
        with:
          enable-cache: true
          cache-dependency-glob: pyproject.toml
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.13"
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "frontend/package-lock.json"
      - run: uv pip install --system ".[dev,docs]"
      - run: npm --prefix frontend ci
      - run: npm install -g markdownlint-cli2
      - run: markdownlint-cli2 "docs/**/*.md"
      - run: python -m scieasy.qa.docs.generate_reference --target all --check
      - run: npm --prefix frontend run docs:api
      - run: python scripts/audit/generate_facts.py --check
      - run: sphinx-lint docs
      - run: sphinx-build -b html -W --keep-going -n docs/sphinx docs/_build/html
      - run: sphinx-build -b linkcheck -W --keep-going docs/sphinx docs/_build/linkcheck
