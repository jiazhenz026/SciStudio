name: Workflow Gate Check

on:
  pull_request:
    types: [opened, synchronize, reopened, edited, ready_for_review, labeled, unlabeled]
  workflow_dispatch:

jobs:
  workflow-gate:
    name: Verify Workflow Compliance
    runs-on: ubuntu-latest
    if: github.event.pull_request.user.login != 'dependabot[bot]'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Validate committed gate records
        env:
          BASE_REF: ${{ github.base_ref || 'main' }}
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_LABELS_JSON: ${{ toJson(github.event.pull_request.labels.*.name) }}
        run: |
          set -euo pipefail

          CHANGED="$(git diff --name-only "origin/$BASE_REF...HEAD")"
          RECORDS="$(echo "$CHANGED" | grep -E '^\.workflow/records/[^/]+\.json$' || true)"

          if [ -z "$RECORDS" ]; then
            if python -c 'import json, os, sys; labels=set(json.loads(os.environ.get("PR_LABELS_JSON", "[]"))); sys.exit(0 if "human-authored" in labels else 1)'; then
              echo "::notice::human-authored PR may skip AI-only gate-record evidence; repository CI/review still applies."
              exit 0
            fi
            echo "::error::ADR-042 requires exactly one committed .workflow/records/*.json gate record for AI-authored PRs."
            exit 1
          fi

          if [ "$(echo "$RECORDS" | sed '/^$/d' | wc -l)" -ne 1 ]; then
            echo "::error::ADR-042 expects exactly one committed gate record per PR."
            echo "$RECORDS"
            exit 1
          fi

          LABEL_ARGS=()
          while IFS= read -r label; do
            [ -n "$label" ] || continue
            LABEL_ARGS+=(--pr-label "$label")
          done < <(python -c 'import json, os; [print(label) for label in json.loads(os.environ.get("PR_LABELS_JSON", "[]"))]')

          while IFS= read -r record; do
            [ -n "$record" ] || continue
            PYTHONPATH=src python -m scieasy.qa.governance.gate_record ci \
              --gate-record "$record" \
              --base "origin/$BASE_REF" \
              --head HEAD \
              --pr-body "$PR_BODY" \
              "${LABEL_ARGS[@]}"
          done <<EOF
          $RECORDS
          EOF

      - name: Run ADR-042 guard orchestration
        env:
          BASE_REF: ${{ github.base_ref || 'main' }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          set -euo pipefail
          CHANGED="$(git diff --name-only "origin/$BASE_REF...HEAD")"
          RECORD="$(echo "$CHANGED" | grep -E '^\.workflow/records/[^/]+\.json$' | head -1 || true)"
          if [ -z "$RECORD" ]; then
            echo "::notice::No AI gate record to orchestrate; skipped for human-authored/dependabot path."
            exit 0
          fi

          PYTHONPATH=src python - <<'PY'
          import json
          import os
          import subprocess
          import sys
          from pathlib import Path

          from scieasy.qa.governance import docs_landing, issue_link, mod_guard, sentrux_gate, weakened_ci_check

          base = os.environ["BASE_REF"]
          pr_body = os.environ.get("PR_BODY", "")
          changed = subprocess.check_output(
              ["git", "diff", "--name-only", f"origin/{base}...HEAD"],
              text=True,
          ).splitlines()
          record_path = next(path for path in changed if path.startswith(".workflow/records/") and path.endswith(".json"))
          record = json.loads(Path(record_path).read_text(encoding="utf-8"))

          reports = [
              issue_link.check(issues=record.get("issues", []), pr_body=pr_body, require_closing=True, repo_root=Path(".")),
              docs_landing.check(changed_files=changed, docs_landing=record.get("docs_landing", {}), repo_root=Path(".")),
              sentrux_gate.verify_free_tier_claims(record.get("sentrux"), changed_files=changed, repo_root=Path(".")),
              mod_guard.check(Path("."), base_ref=f"origin/{base}", head_ref="HEAD", allow_governance_change=bool(record.get("governance_touch"))),
              weakened_ci_check.verify_no_weakening(Path("."), base_ref=f"origin/{base}", head_ref="HEAD"),
          ]
          failed = False
          for report in reports:
              print(json.dumps(report.model_dump(mode="json"), indent=2, sort_keys=True))
              failed = failed or report.blocks_merge
          sys.exit(1 if failed else 0)
          PY
