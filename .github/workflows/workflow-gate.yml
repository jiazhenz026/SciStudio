name: ADR-042 PR Governance

on:
  pull_request:
    types: [opened, synchronize, reopened, edited, ready_for_review]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  issue-link:
    name: Issue Link
    runs-on: ubuntu-latest
    steps:
      - name: Require linked issue
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ] && [ -z "$PR_BODY" ]; then
            echo "workflow_dispatch run without PR body; skipping issue-link check"
            exit 0
          fi
          if ! echo "$PR_BODY" | grep -qiE "(closes|fixes|resolves)\s+#[0-9]+"; then
            echo "::error::PR must link an issue with Closes/Fixes/Resolves #NNN"
            exit 1
          fi
          echo "Issue link found"
