name: Workflow Gate Check

on:
  pull_request:
    types: [opened, synchronize, reopened, edited, ready_for_review, labeled, unlabeled]
  workflow_dispatch:

jobs:
  workflow-gate:
    name: Verify Workflow Compliance
    runs-on: ubuntu-latest
    if: github.event.pull_request.user.login != 'dependabot[bot]'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - uses: astral-sh/setup-uv@v7

      - name: Install gate dependencies
        run: uv pip install --system -e ".[dev]"

      # ADR-042 Addendum 6 §6: CI is a thin caller of the single shared
      # evaluator. The two legacy steps ("Validate committed gate records" +
      # "Run ADR-042 guard orchestration") collapse into one
      # `gate_record check --mode ci` invocation; the evaluator owns PR-metadata
      # assembly, bypass semantics, surface classification, tier selection, and
      # all guard calculators (run once each). The `.workflow-pr-metadata.json`
      # temp-file coupling between steps is removed: the PR body is passed via a
      # file and the remaining PR context is consumed by the evaluator's CI mode.
      - name: Run ADR-042 gate evaluator (ci mode)
        env:
          BASE_REF: ${{ github.base_ref || 'main' }}
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_LABELS_JSON: ${{ toJson(github.event.pull_request.labels.*.name) }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          PR_BODY_FILE="$(mktemp)"
          printf '%s' "$PR_BODY" > "$PR_BODY_FILE"

          # Migrated label vocabulary (Addendum 6 §4.2): the broad bypass label
          # is now `admin-approved:bypass` (was `admin-approved:ai-override`).
          # The evaluator verifies label-actor provenance internally in ci mode;
          # this step only forwards PR context and the evaluator's exit code.
          PYTHONPATH=src python -m scistudio.qa.governance.gate_record check \
            --mode ci \
            --base "origin/$BASE_REF" \
            --head HEAD \
            --pr-body-file "$PR_BODY_FILE"
        shell: bash
