name: E2E Discovery

on:
  pull_request:
    branches:
      - main
      - 'track/**'
      - 'umbrella/**'
    paths:
      - '.github/workflows/e2e-discovery.yml'
      - 'frontend/playwright.config.ts'
      - 'frontend/e2e/**'
      - 'frontend/package.json'
      - 'frontend/package-lock.json'
      - 'frontend/src/**'
      - 'src/**'
      - 'packages/scistudio-blocks-imaging/**'
  push:
    branches:
      - main
      - 'track/**'
      - 'umbrella/**'
      - 'feat/issue-1384/**'
    paths:
      - '.github/workflows/e2e-discovery.yml'
      - 'frontend/playwright.config.ts'
      - 'frontend/e2e/**'
      - 'frontend/package.json'
      - 'frontend/package-lock.json'
      - 'frontend/src/**'
      - 'src/**'
      - 'packages/scistudio-blocks-imaging/**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e-discovery:
    name: Playwright Discovery (non-blocking)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - uses: astral-sh/setup-uv@v7
        with:
          cache: true
          cache-dependency-path: pyproject.toml

      - name: Install Python dependencies
        run: uv pip install --system ".[dev]"

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright Chromium
        working-directory: frontend
        run: npm exec --yes --package @playwright/test@1.57.0 -- node e2e/support/run-playwright.mjs install --with-deps chromium

      - name: Run non-blocking E2E discovery
        id: e2e
        working-directory: frontend
        env:
          CI: '1'
          SCISTUDIO_E2E_ARTIFACT_DIR: ${{ github.workspace }}/frontend/.e2e-artifacts
        run: |
          set +e
          npm run test:e2e
          status=$?
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          echo "E2E discovery exit code: $status" >> "$GITHUB_STEP_SUMMARY"
          exit 0

      - name: Upload E2E artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-discovery-artifacts
          if-no-files-found: warn
          path: |
            frontend/.e2e-artifacts/**

      - name: Non-blocking result
        if: always()
        run: |
          echo "E2E discovery is non-blocking for issue #1384." >> "$GITHUB_STEP_SUMMARY"
          echo "Playwright exit code: ${{ steps.e2e.outputs.exit_code || 'not-run' }}" >> "$GITHUB_STEP_SUMMARY"
