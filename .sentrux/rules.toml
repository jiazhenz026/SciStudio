[constraints]
# Lock the current baseline first, then ratchet down toward zero cycles.
# Baseline observed by sentrux on 2026-05-20: cycles = 5.
max_cycles = 5
# Baseline raised 2026-05-20 to unblock PRs (#1291); ratchet back toward 75
# after src/scistudio/workflow/validator.py:validate_workflow is split into
# per-check helpers (followup: #1292).
max_cc = 100
no_god_files = false

[[layers]]
name = "frontend"
paths = ["frontend/src/*"]
order = 0

[[layers]]
name = "interfaces"
paths = [
  "src/scistudio/api/*",
  "src/scistudio/cli/*",
  "src/scistudio/ai/*",
  "src/scistudio/agent_provisioning/*",
]
order = 1

[[layers]]
name = "extensions"
paths = ["packages/*"]
order = 2

[[layers]]
name = "runtime"
paths = [
  "src/scistudio/workflow/*",
  "src/scistudio/engine/*",
  "src/scistudio/blocks/*",
]
order = 3

[[layers]]
name = "core"
paths = ["src/scistudio/core/*"]
order = 4

[[boundaries]]
from = "src/scistudio/core/*"
to = "src/scistudio/api/*"
reason = "Core contracts must not depend on API or UI entrypoints."

[[boundaries]]
from = "src/scistudio/core/*"
to = "src/scistudio/cli/*"
reason = "Core contracts must not depend on CLI orchestration."

[[boundaries]]
from = "src/scistudio/core/*"
to = "src/scistudio/ai/*"
reason = "AI orchestration must not leak into core contracts."

[[boundaries]]
from = "src/scistudio/core/*"
to = "src/scistudio/blocks/*"
reason = "Core should define primitive contracts, not depend on block implementations."

[[boundaries]]
from = "src/scistudio/engine/*"
to = "src/scistudio/api/*"
reason = "Runtime execution must not depend on API presentation."

[[boundaries]]
from = "src/scistudio/engine/*"
to = "src/scistudio/cli/*"
reason = "Runtime execution must not depend on CLI entrypoints."

[[boundaries]]
from = "packages/*"
to = "src/scistudio/api/*"
reason = "Plugin packages should depend on runtime and block contracts, not API internals."

[[boundaries]]
from = "packages/*"
to = "src/scistudio/cli/*"
reason = "Plugin packages should not depend on CLI internals."
