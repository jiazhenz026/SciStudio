[constraints]
# Lock the current baseline first, then ratchet down toward zero cycles.
# Baseline observed by sentrux on 2026-05-20: cycles = 5.
# Ratcheted to 3 on 2026-05-21 after #1335 + #1337 landed via umbrella PR #1344.
#   - #1335 broke the core.types <-> core.storage.backend_router SCC.
#   - #1337 broke the core.versioning + engine.runners pairwise cycles.
# The remaining 3 clusters are all inside #1336's territory (blocks.registry
# <-> ai.agent.* cross-layer SCC, P0). Ratchet to 0 once #1336 closes.
# Tracking issues for follow-ups:
#   - #1336 (P0) — blocks/ai.agent SCC; resolves remaining 3 clusters.
#   - #1341 (P3, blocked-by #1336) — add no_cycles import-linter contract.
#   - #1342 (P3, tech-debt) — eliminate the lazy import added in
#     backend_router.get_router by #1335's transitional surgical fix.
# Raised to 5 on 2026-05-22 (umbrella #1427 Phase 3 ADR drafts, issue
# #1465). Phase 1 PR #1444 introduced the ai_pty sub-package self-cycle
# by design (audit P3#4 — lazy-lookup monkeypatch contract preserves
# pre-refactor test seams). Phase 2 PR #1460's new io/savers + io/loaders
# sub-packages expanded simple-cycle count inside the pre-existing
# blocks.registry <-> ai.agent SCC. Refactor headroom lets Phase 3
# implementer PRs land; ADR-047 registry decomposition will naturally
# shrink the SCC. Ratchet back to 0 after #1336 + Phase 3 land.
max_cycles = 5
# Baseline raised 2026-05-20 to unblock PRs (#1291); ratchet back toward 75
# after src/scistudio/workflow/validator.py:validate_workflow is split into
# per-check helpers (followup: #1292).
max_cc = 100
no_god_files = false

[[layers]]
name = "frontend"
paths = ["frontend/src/*"]
order = 0

[[layers]]
name = "interfaces"
paths = [
  "src/scistudio/api/*",
  "src/scistudio/cli/*",
  "src/scistudio/ai/*",
  "src/scistudio/agent_provisioning/*",
]
order = 1

[[layers]]
name = "extensions"
paths = ["packages/*"]
order = 2

[[layers]]
name = "runtime"
paths = [
  "src/scistudio/workflow/*",
  "src/scistudio/engine/*",
  "src/scistudio/blocks/*",
]
order = 3

[[layers]]
name = "core"
paths = ["src/scistudio/core/*"]
order = 4

[[boundaries]]
from = "src/scistudio/core/*"
to = "src/scistudio/api/*"
reason = "Core contracts must not depend on API or UI entrypoints."

[[boundaries]]
from = "src/scistudio/core/*"
to = "src/scistudio/cli/*"
reason = "Core contracts must not depend on CLI orchestration."

[[boundaries]]
from = "src/scistudio/core/*"
to = "src/scistudio/ai/*"
reason = "AI orchestration must not leak into core contracts."

[[boundaries]]
from = "src/scistudio/core/*"
to = "src/scistudio/blocks/*"
reason = "Core should define primitive contracts, not depend on block implementations."

[[boundaries]]
from = "src/scistudio/engine/*"
to = "src/scistudio/api/*"
reason = "Runtime execution must not depend on API presentation."

[[boundaries]]
from = "src/scistudio/engine/*"
to = "src/scistudio/cli/*"
reason = "Runtime execution must not depend on CLI entrypoints."

[[boundaries]]
from = "packages/*"
to = "src/scistudio/api/*"
reason = "Plugin packages should depend on runtime and block contracts, not API internals."

[[boundaries]]
from = "packages/*"
to = "src/scistudio/cli/*"
reason = "Plugin packages should not depend on CLI internals."
