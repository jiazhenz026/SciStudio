[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "scistudio-blocks-lcms"
version = "0.1.0.dev0"
description = "SciStudio LC-MS plugin — placeholder skeleton (Phase 11)."
requires-python = ">=3.11"
dependencies = [
    "scistudio>=0.2.1a0",
]

[project.entry-points."scistudio.blocks"]
lcms = "scistudio_blocks_lcms:get_block_package"

[project.entry-points."scistudio.types"]
lcms = "scistudio_blocks_lcms:get_types"

[tool.setuptools.packages.find]
where = ["src"]
