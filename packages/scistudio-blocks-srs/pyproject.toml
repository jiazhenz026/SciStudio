[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "scistudio-blocks-srs"
version = "0.1.0.dev0"
description = "SciStudio SRS plugin — placeholder skeleton (Phase 11)."
requires-python = ">=3.11"
dependencies = [
    "numpy>=1.26",
    "scistudio>=0.2.1a0",
    "scistudio-blocks-imaging>=0.1.0.dev0",
    "scikit-learn>=1.5",
    "scipy>=1.11",
]

[project.entry-points."scistudio.blocks"]
srs = "scistudio_blocks_srs:get_block_package"

[project.entry-points."scistudio.types"]
srs = "scistudio_blocks_srs:get_types"

[project.optional-dependencies]
pywt = ["PyWavelets>=1.6"]
bm4d = ["bm4d>=4.2"]

[tool.setuptools.packages.find]
where = ["src"]
